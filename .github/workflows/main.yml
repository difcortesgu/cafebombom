name: Build and Release POS (Web & Bun)

on:
  push:
    branches:
      - main

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node (Para Frontend)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Setup Bun (Para Backend)
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Build Frontend (Web)
        run: |
          cd frontend
          npm install
          echo "EXPO_PUBLIC_API_BASE_URL=http://localhost:3000/api" > .env
          npx expo export --platform web

      - name: Compilar Backend con Bun
        run: |
          cd backend
          bun install 

          # Copiar el frontend al backend ANTES de compilar
          cp -R ../frontend/dist ./public

          # Generar ejecutables base
          bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile=pos-app.exe
          bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile=pos-app-linux
          chmod +x pos-app-linux

          # Crear carpetas temporales para empaquetar
          mkdir release-windows release-linux

          # Distribuir archivos Windows
          mv pos-app.exe release-windows/
          cp -R ./public release-windows/public
          cp -R ./src/database/migrations release-windows/migrations

          # Distribuir archivos Linux
          mv pos-app-linux release-linux/
          cp -R ./public release-linux/public
          cp -R ./src/database/migrations release-linux/migrations

      - name: Generar Scripts de Instalación (Windows y Linux)
        run: |
          cd backend

          # ==========================================
          # 1. LINUX: Archivo .desktop y Script install.sh
          # ==========================================
          cat << 'EOF' > release-linux/CafeBomBom.desktop
          [Desktop Entry]
          Version=1.0
          Name=Caja POS Cafe BomBom
          Comment=Sistema de Punto de Venta
          Exec=/opt/cafebombom/pos-app-linux
          Icon=utilities-terminal
          Terminal=false
          Type=Application
          Categories=Utility;
          EOF

          cat << 'EOF' > release-linux/install.sh
          #!/bin/bash
          echo "Instalando Cafe BomBom POS..."
          sudo mkdir -p /opt/cafebombom
          sudo cp -R ./* /opt/cafebombom/
          sudo chmod +x /opt/cafebombom/pos-app-linux
          sudo cp /opt/cafebombom/CafeBomBom.desktop /usr/share/applications/
          echo "¡Instalación completada! Búscalo en tu menú de aplicaciones."
          EOF
          chmod +x release-linux/install.sh

          # Empaquetamos el instalador final de Linux
          cd release-linux && tar -czvf ../Instalador_CafeBomBom_Linux.tar.gz ./* && cd ..

          # ==========================================
          # 2. WINDOWS: Script VBScript invisible
          # ==========================================
          cat << 'EOF' > release-windows/Iniciar_POS.vbs
          Set WshShell = CreateObject("WScript.Shell")
          WshShell.Run chr(34) & "pos-app.exe" & Chr(34), 0
          Set WshShell = Nothing
          EOF

          # ==========================================
          # 3. WINDOWS: Configuración Inno Setup (.iss)
          # ==========================================
          cat << 'EOF' > release-windows/installer.iss
          [Setup]
          AppName=Cafe BomBom POS
          AppVersion=1.0
          DefaultDirName={autopf}\CafeBomBom
          OutputBaseFilename=Instalar_CafeBomBom_Windows
          Compression=lzma
          SolidCompression=yes
          ; Pone el instalador final fuera de la carpeta
          OutputDir=..\

          [Files]
          Source: "*"; Excludes: "installer.iss"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\Cafe BomBom"; Filename: "{app}\Iniciar_POS.vbs"
          Name: "{autodesktop}\Cafe BomBom"; Filename: "{app}\Iniciar_POS.vbs"
          EOF

      - name: Compilar Instalador de Windows (Inno Setup)
        uses: slavrd/inno-setup-action@v3.0.0
        with:
          filepath: backend/release-windows/installer.iss

      - name: Generate Dynamic Version Tag
        id: version_tag
        run: echo "tag_name=v$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_tag.outputs.tag_name }}
          name: "POS System Release ${{ steps.version_tag.outputs.tag_name }}"
          draft: false
          prerelease: false
          files: |
            backend/Instalar_CafeBomBom_Windows.exe
            backend/Instalador_CafeBomBom_Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
