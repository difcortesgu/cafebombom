name: Build and Release POS (Web & Bun)

on:
  push:
    branches:
      - main

jobs:
  # ==========================================
  # JOB 1: Compilar Frontend (Con Caché Inteligente)
  # ==========================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # 1. Intentamos recuperar la carpeta 'dist' de un caché anterior
      - name: Caché de la carpeta Dist del Frontend
        id: cache-frontend
        uses: actions/cache@v4
        with:
          path: frontend/dist
          # El caché se invalida (se rompe) si cambia CUALQUIER archivo fuente del frontend
          key: frontend-dist-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json', 'frontend/src/**', 'frontend/app/**', 'frontend/App.*', 'frontend/*.config.js', 'frontend/app.json') }}

      # 2. SOLO ejecutamos esto si GitHub NO encontró un caché válido
      - name: Build Web (Solo si el código cambió)
        if: steps.cache-frontend.outputs.cache-hit != 'true'
        run: |
          cd frontend
          npm install
          echo "EXPO_PUBLIC_API_BASE_URL=http://localhost:3000/api" > .env
          npx expo export --platform web

      # 3. Siempre subimos el Artifact (ya sea recién compilado o restaurado del caché)
      - name: Subir Frontend como Artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  # ==========================================
  # JOB 2: Empaquetar para Linux (Nativo)
  # ==========================================
  build-linux:
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Descargar Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/public

      - name: Compilar y Empaquetar Linux
        run: |
          cd backend
          bun install

          # Compilar binario de Bun
          bun build ./src/index.ts --compile --target=bun-linux-x64 --outfile=pos-app-linux
          chmod +x pos-app-linux

          # Preparar carpeta
          mkdir release-linux
          mv pos-app-linux release-linux/
          cp -R ./public release-linux/public
          cp -R ./src/database/migrations release-linux/migrations

          # Generar Scripts sin SUDO para instalación a nivel de usuario
          cat << 'EOF' > release-linux/install.sh
          #!/bin/bash

          # 1. Definir carpetas seguras del usuario (No requieren sudo)
          APP_DIR="$HOME/.local/share/CafeBomBom"
          DESKTOP_DIR="$HOME/.local/share/applications"

          # 2. Crear carpetas
          mkdir -p "$APP_DIR"
          mkdir -p "$DESKTOP_DIR"

          # 3. Copiar el programa
          cp -R ./* "$APP_DIR/"
          chmod +x "$APP_DIR/pos-app-linux"

          # 4. Crear el archivo .desktop dinámicamente con la ruta exacta del usuario
          cat << DESK > "$DESKTOP_DIR/CafeBomBom.desktop"
          [Desktop Entry]
          Version=1.0
          Name=Caja POS Cafe BomBom
          Comment=Sistema de Punto de Venta
          Exec=$APP_DIR/pos-app-linux
          Icon=utilities-terminal
          Terminal=false
          Type=Application
          Categories=Utility;
          DESK

          chmod +x "$DESKTOP_DIR/CafeBomBom.desktop"

          # 5. Mostrar una ventana de éxito visual (Soporta GNOME y KDE)
          if command -v zenity &> /dev/null; then
              zenity --info --text="Instalación completada exitosamente!\n\nYa puedes encontrar Cafe BomBom en tu menú de aplicaciones." --title="Cafe BomBom POS"
          elif command -v kdialog &> /dev/null; then
              kdialog --msgbox "Instalación completada exitosamente!\n\nYa puedes encontrar Cafe BomBom en tu menú de aplicaciones." --title "Cafe BomBom POS"
          else
              echo "¡Instalación completada! Búscalo en tu menú de aplicaciones."
          fi
          EOF

          chmod +x release-linux/install.sh

          # Comprimir
          cd release-linux && tar -czvf ../Instalador_CafeBomBom_Linux.tar.gz ./* && cd ..

      - name: Subir Instalador Linux
        uses: actions/upload-artifact@v4
        with:
          name: linux-installer
          path: backend/Instalador_CafeBomBom_Linux.tar.gz

  # ==========================================
  # JOB 3: Empaquetar para Windows (Nativo)
  # ==========================================
  build-windows:
    needs: build-frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Descargar Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/public

      - name: Compilar y Empaquetar Windows
        shell: pwsh
        run: |
          cd backend
          bun install

          # Compilar binario de Bun
          bun build ./src/index.ts --compile --target=bun-windows-x64 --outfile=pos-app.exe

          # Preparar carpeta
          New-Item -ItemType Directory -Force -Path release-windows
          Move-Item pos-app.exe release-windows/
          Copy-Item -Recurse ./public release-windows/public
          Copy-Item -Recurse ./src/database/migrations release-windows/migrations

          # Generar VBScript (En PowerShell)
          @"
          Set WshShell = CreateObject("WScript.Shell")
          WshShell.Run chr(34) & "pos-app.exe" & Chr(34), 0
          Set WshShell = Nothing
          "@ | Out-File -FilePath release-windows/Iniciar_POS.vbs -Encoding utf8

          # Generar Configuración de Inno Setup
          @"
          [Setup]
          AppName=Cafe BomBom POS
          AppVersion=1.0
          DefaultDirName={autopf}\CafeBomBom
          OutputBaseFilename=Instalar_CafeBomBom_Windows
          Compression=lzma
          SolidCompression=yes
          OutputDir=..\

          [Files]
          Source: "*"; Excludes: "installer.iss"; DestDir: "{app}"; Flags: ignoreversion recursesubdirs createallsubdirs

          [Icons]
          Name: "{autoprograms}\Cafe BomBom"; Filename: "{app}\Iniciar_POS.vbs"
          Name: "{autodesktop}\Cafe BomBom"; Filename: "{app}\Iniciar_POS.vbs"
          "@ | Out-File -FilePath release-windows/installer.iss -Encoding utf8

      - name: Ejecutar Inno Setup Nativo
        shell: cmd
        run: |
          cd backend\release-windows
          "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer.iss

      - name: Subir Instalador Windows
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: backend/Instalar_CafeBomBom_Windows.exe

  # ==========================================
  # JOB 4: Publicar el Release en GitHub
  # ==========================================
  publish-release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Descargar Instalador Linux
        uses: actions/download-artifact@v4
        with:
          name: linux-installer
          path: final-assets

      - name: Descargar Instalador Windows
        uses: actions/download-artifact@v4
        with:
          name: windows-installer
          path: final-assets

      - name: Generate Dynamic Version Tag
        id: version_tag
        run: echo "tag_name=v$(date +'%Y.%m.%d-%H%M')" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and Upload Assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version_tag.outputs.tag_name }}
          name: "POS System Release ${{ steps.version_tag.outputs.tag_name }}"
          draft: false
          prerelease: false
          files: |
            final-assets/Instalar_CafeBomBom_Windows.exe
            final-assets/Instalador_CafeBomBom_Linux.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
